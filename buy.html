<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Song - BrokenLoop</title>
  <link rel="stylesheet" href="buy.css" />
  <link rel="icon" type="image/png" href="/brokenloop-favicon.png?v=3" />
  <link rel="shortcut icon" href="/brokenloop-favicon.png?v=3" />
  <link rel="apple-touch-icon" href="/brokenloop-favicon.png?v=3" />
</head>
<body>
  <div class="noise"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>

  <main class="page">
    <header class="site-header">
      <a href="index.html" class="site-logo">BROKENLOOP</a>

      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <header class="topbar">
      <a href="songs.html" class="back">← Back / 返回歌曲页</a>
      <div class="brand">BROKENLOOP / BUY SONG</div>
    </header>

    <section class="buy-shell">
      <div id="buySongCard" class="buy-card">
        <p>Loading song...</p>
      </div>
    </section>

    <footer class="site-footer">
      <div class="footer-brand">
        <div class="footer-logo">BROKENLOOP</div>
        <p>Loops for the hearts that stayed too long.</p>
      </div>

      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="songs.html">Songs</a>
        <a href="about.html">About</a>
        <a href="login.html">Login</a>
      </div>
    </footer>
  </main>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabaseUrl = 'https://ptoshuzzjqbbdqzrlhco.supabase.co';
    const supabaseKey = 'sb_publishable_lxT1yF6WOgpN7uK3AQVoSA_5yKDlLui';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const buySongCard = document.getElementById('buySongCard');

    const params = new URLSearchParams(window.location.search);
    const songId = params.get('song_id');

    async function loadBuyPage() {
      if (!songId) {
        buySongCard.innerHTML = '<p>Missing song ID / 缺少歌曲编号</p>';
        return;
      }

      const {
        data: { session }
      } = await supabase.auth.getSession();

      if (!session || !session.user) {
        window.location.href = `login.html?redirect=buy.html?song_id=${songId}`;
        return;
      }

      const user = session.user;

      const { data: song, error } = await supabase
        .from('songs')
        .select('*')
        .eq('id', songId)
        .maybeSingle();

      if (error || !song) {
        buySongCard.innerHTML = `<p>Song not found / 找不到歌曲</p>`;
        return;
      }

      const { data: existingOwned } = await supabase
        .from('member_songs')
        .select('id')
        .eq('user_id', user.id)
        .eq('song_id', songId)
        .maybeSingle();

      buySongCard.innerHTML = `
        <div class="buy-card-layout">
          ${
            song.cover_url
              ? `<img src="${song.cover_url}" alt="${song.title || 'cover'}" class="buy-cover" />`
              : `<div class="buy-cover placeholder">No Cover</div>`
          }

          <div class="buy-info">
            <h1>${song.title || 'Untitled'}</h1>
            <p class="buy-meta">${song.artist || '-'} · SGD ${song.price_sgd ?? '-'}</p>
            <p class="buy-sub">${song.title_en || '-'}</p>

            ${
              song.preview_url
                ? `
                  <audio controls preload="none" class="buy-player">
                    <source src="${song.preview_url}" type="audio/mpeg" />
                  </audio>
                `
                : `<p class="buy-note">Preview not available / 暂无试听</p>`
            }

            <div class="buy-actions">
              ${
                existingOwned
                  ? `<a href="library.html" class="buy-btn owned-btn">Already Owned / 已拥有，去歌单</a>`
                  : `<button id="confirmBuyBtn" class="buy-btn" type="button">Buy Now / 立即购买</button>`
              }
              <a href="songs.html" class="ghost-btn">Back to Songs / 返回歌曲页</a>
            </div>

            <div id="buyResult" class="buy-result"></div>
          </div>
        </div>
      `;

      const confirmBuyBtn = document.getElementById('confirmBuyBtn');
      const buyResult = document.getElementById('buyResult');

      if (confirmBuyBtn) {
        confirmBuyBtn.addEventListener('click', async () => {
          confirmBuyBtn.disabled = true;
          confirmBuyBtn.textContent = 'Processing... / 处理中...';
          buyResult.textContent = '';

          const { error: insertError } = await supabase
            .from('member_songs')
            .insert({
              user_id: user.id,
              song_id: songId
            });

          if (insertError) {
            const msg = (insertError.message || '').toLowerCase();

            if (msg.includes('duplicate') || msg.includes('unique')) {
              buyResult.textContent = 'You already own this song / 你已经拥有这首歌';
            } else {
              buyResult.textContent = 'Purchase failed / 购买失败：' + insertError.message;
            }

            confirmBuyBtn.disabled = false;
            confirmBuyBtn.textContent = 'Buy Now / 立即购买';
            return;
          }

          buyResult.textContent = 'Purchase successful / 购买成功，正在跳转到收藏...';

          setTimeout(() => {
            window.location.href = 'library.html';
          }, 1000);
        });
      }
    }

    loadBuyPage();
  </script>
</body>
</html>
