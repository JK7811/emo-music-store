<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrokenLoop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow top"></div>
  <div class="bg-glow bottom"></div>

  <main class="hero">
    <div class="badge">BROKENLOOP / 破碎循环</div>

    <h1>
      Loops for the hearts that stayed too long.
      <span>献给那些停留太久、走不出来的人。</span>
    </h1>

    <p>
      A dark little place for unfinished feelings, midnight songs, and the people who still replay everything.
      <br /><br />
      一个收留未完情绪、深夜歌曲，还有那些不断重复回忆的人的地方。
    </p>

    <div class="actions">
      <a href="#" class="button primary">Enter / 进入</a>
      <a href="#" class="button">Preview Songs / 试听歌曲</a>
    </div>
  </main>
</body>
</html>
